<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — AI&amp;DS Attendance</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <div class="page-center">
    <div class="card">

      <div class="card-logo">🔐</div>
      <h1>Admin Login</h1>
      <p class="card-subtitle">Restricted to authorized administrators</p>

      {% if error %}
      <div class="alert alert-error">⚠️ {{ error }}</div>
      {% endif %}

      <form method="post" action="/admin_login">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username"
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password"
            autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary">
          🔓&nbsp; Sign In
        </button>

      </form>

      <a class="link-subtle" href="/">← Back to Attendance</a>

    </div>
  </div>

</body>

</html>
