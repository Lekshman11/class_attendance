<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Recorded — AI&amp;DS</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <div class="page-center">
    <div class="card info-card">

      {% if status == 'absent' %}
      <span class="info-icon">❌</span>
      <h1>Absent Recorded</h1>
      <p>Hello <strong>{{ name }}</strong>, your absence has been recorded for today.</p>
      <p style="margin-top:6px; color: var(--text-muted); font-size: 0.85rem;">
        The admin will be notified of your absence.
      </p>
      {% else %}
      <span class="info-icon">✅</span>
      <h1>Attendance Marked!</h1>
      <p>Hello <strong>{{ name }}</strong>, your attendance has been successfully recorded.</p>
      {% endif %}

    </div>
  </div>

</body>

</html>
