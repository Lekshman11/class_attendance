<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI&amp;DS Attendance Portal</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="page-center">
  <div class="card">

    <!-- Logo -->
    <div class="card-logo">🎓</div>
    <h1>AI&amp;DS Attendance</h1>
    <p class="card-subtitle">Mark your attendance quickly and securely</p>

    <!-- Flash / status messages (JS-injected) -->
    <div id="status-msg" style="display:none"></div>

    <form id="attendance-form" action="/mark" method="post">

      <div class="form-group">
        <label for="reg_no">Register Number</label>
        <input
          type="text"
          id="reg_no"
          name="reg_no"
          placeholder="e.g. SPR22CS001"
          autocomplete="off"
          autocapitalize="characters"
          style="text-transform:uppercase"
          required
        >
      </div>

      <div class="form-group">
        <label for="name">Student Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Auto-filled after entering register number"
          readonly
        >
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">
        ✅&nbsp; Mark Attendance
      </button>

    </form>

    <a class="link-subtle" href="/admin_login">
      <span>Admin Login</span> →
    </a>

  </div>
</div>


<script>
  const regInput  = document.getElementById('reg_no');
  const nameInput = document.getElementById('name');
  const statusMsg = document.getElementById('status-msg');
  const submitBtn = document.getElementById('submit-btn');

  function showStatus(msg, type) {
    statusMsg.className = 'alert alert-' + type;
    statusMsg.textContent = msg;
    statusMsg.style.display = 'flex';
  }

  // Fetch student name on input (live) and on blur
  function fetchName() {
    const reg = regInput.value.trim();
    if (reg.length < 3) {
      nameInput.value = '';
      return;
    }
    fetch('/get_name?reg_no=' + encodeURIComponent(reg))
      .then(r => r.json())
      .then(data => {
        nameInput.value = data.name || '';
        if (data.name) {
          statusMsg.style.display = 'none';
        } else if (reg.length >= 8) {
          showStatus('⚠️ Register number not found. Please check and retry.', 'error');
        }
      })
      .catch(() => {});
  }

  regInput.addEventListener('input', fetchName);
  regInput.addEventListener('blur',  fetchName);

  // Show loading state while submitting
  document.getElementById('attendance-form').addEventListener('submit', function () {
    if (!nameInput.value) {
      showStatus('⚠️ No student found for this register number.', 'error');
      event.preventDefault();
      return;
    }
    submitBtn.textContent = '⏳ Marking…';
    submitBtn.disabled   = true;
  });
</script>

</body>
</html>
